name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Type-check
        run: bun run check

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build
        env:
          SMTP_HOST: localhost
          SMTP_PORT: "587"
          SMTP_USER: ci@example.com
          SMTP_PASS: ci-secret
          MAIL_FROM: ci@example.com
          MAIL_TO: ci@example.com
